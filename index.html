<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product_list_cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
  <section class="products-column">
    <h1>Food Items</h1>
    <div id="product-grid" class="product-grid">
      </div>
  </section>

  <aside class="cart-container">
    <h2>Your Cart (<span id="cart-count">0</span>)</h2>
    
    <div id="empty-cart" class="empty-cart">
      <img src="images/illustration-empty-cart.svg" alt="Empty Cart">
      <p>Your added items will appear here</p>
    </div>

    <div id="active-cart" class="active-cart" style="display: none;">
      <div id="cart-items"></div>
      <div class="cart-total">
        <span>Order Total</span>
        <strong id="order-total">$0.00</strong>
      </div>
      <button class="confirm-btn">Confirm Order</button>
      <!-- <input type="button" value="click"> -->
    </div>
  </aside>
</main>

<div id="order-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <img src="images/icon-order-confirmed.svg" alt="Confirmed">
        <h1>Order Confirmed</h1>
        <p>We hope you enjoy your food!</p>
         
        <div id="modal-items-container">
            </div>

        <div class="modal-total">
            <span>Order Total</span>
            <strong id="modal-total-price">₦0.00</strong>
        </div>

        <button id="new-order-btn" class="new-order-btn">Start New Order</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
